name: publish

# Triggered automatically when a GitHub release is published (gh release create
# vX.Y.Z dist/* ... --notes "..."), or manually via the Actions tab to push the
# current tip to TestPyPI for rehearsal.
#
# Uses PyPI Trusted Publishing (OIDC) — no tokens stored as repo secrets.
# Prerequisite, one-time on each index:
#   https://pypi.org/manage/account/publishing/  (and the test.pypi.org equivalent)
# add a trusted publisher with:
#   - PyPI Project Name: infereval
#   - Owner:             bradleypallen
#   - Repository name:   infereval
#   - Workflow name:     publish.yml
#   - Environment name:  pypi       (and a second registration with: testpypi)
# The "environment" inputs below must match those registered names exactly.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'Index to publish to'
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build
        run: python -m build
      - name: twine check
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/infereval/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish to PyPI
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/infereval/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
